<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <link rel="stylesheet" href="crazy26.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

</head>

<body>

    <div class="container">
        <div class="form-section">

            <h2>Create Your Resume</h2>

            <label>Full Name</label>
            <input type="text" id="name">

            <label>Job Title</label>
            <input type="text" id="title">

            <label>Email</label>
            <input type="email" id="email">

            <label>Phone</label>
            <input type="text" id="phone">

            <label>About You</label>
            <textarea id="about"></textarea>

            <label>Skills (comma separated)</label>
            <input type="text" id="skills">

            <label>Education</label>
            <textarea id="education"></textarea>

            <label>Experience</label>
            <textarea id="experience"></textarea>

            <button onclick="generateResume()">Generate Resume</button>
            <button onclick="downloadPDF()" class="download">Download PDF</button>

        </div>


        <div class="resume-section">

            <div id="resume">

                <h1 id="r_name">Your Name</h1>
                <h3 id="r_title">Your Title</h3>

                <div class="info">
                    <p id="r_email"></p>
                    <p id="r_phone"></p>
                </div>

                <div class="block">
                    <h2>About</h2>
                    <p id="r_about"></p>
                </div>

                <div class="block">
                    <h2>Skills</h2>
                    <ul id="r_skills"></ul>
                </div>

                <div class="block">
                    <h2>Education</h2>
                    <p id="r_education"></p>
                </div>

                <div class="block">
                    <h2>Experience</h2>
                    <p id="r_experience"></p>
                </div>

            </div>

        </div>

    </div>

    <script src="crazy26.js"></script>

</body>

</html>
